<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#CC0000" stroke-width="0.6" stroke-opacity="0.1"/>
    </pattern>
    <!-- Red glow -->
    <radialGradient id="glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#CC0000" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#CC0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Tire gradient -->
    <radialGradient id="rimGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Red glow blob -->
  <ellipse cx="200" cy="315" rx="500" ry="380" fill="url(#glow)"/>

  <!-- Red left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#CC0000"/>

  <!-- ── TIRE GRAPHIC (right side) ── -->
  <g transform="translate(860, 315)">
    <!-- Outer tire -->
    <circle cx="0" cy="0" r="210" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Tire tread ring -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#333" stroke-width="26"/>
    <!-- Rim outer -->
    <circle cx="0" cy="0" r="175" fill="url(#rimGrad)"/>
    <!-- Spoke shadows (5 spokes) -->
    <line x1="0" y1="0" x2="0"   y2="-148" stroke="#111" stroke-width="34" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="141" y2="-46"  stroke="#111" stroke-width="34" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="87"  y2="121"  stroke="#111" stroke-width="34" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-87" y2="121"  stroke="#111" stroke-width="34" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-141" y2="-46" stroke="#111" stroke-width="34" stroke-linecap="round"/>
    <!-- Spokes -->
    <line x1="0" y1="0" x2="0"   y2="-148" stroke="#555" stroke-width="24" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="141" y2="-46"  stroke="#555" stroke-width="24" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="87"  y2="121"  stroke="#555" stroke-width="24" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-87" y2="121"  stroke="#555" stroke-width="24" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-141" y2="-46" stroke="#555" stroke-width="24" stroke-linecap="round"/>
    <!-- Hub ring -->
    <circle cx="0" cy="0" r="52"  fill="#3a3a3a"/>
    <circle cx="0" cy="0" r="44"  fill="#CC0000"/>
    <circle cx="0" cy="0" r="18"  fill="#0D0D0D"/>
    <!-- Lug bolts -->
    <circle cx="0"  cy="-32" r="6" fill="#555"/>
    <circle cx="30" cy="-10" r="6" fill="#555"/>
    <circle cx="19" cy="26"  r="6" fill="#555"/>
    <circle cx="-19" cy="26" r="6" fill="#555"/>
    <circle cx="-30" cy="-10" r="6" fill="#555"/>
  </g>

  <!-- ── TEXT CONTENT (left side) ── -->
  <!-- Eyebrow label -->
  <rect x="80" y="148" width="280" height="32" rx="16" fill="#CC0000" fill-opacity="0.18"/>
  <rect x="80" y="148" width="280" height="32" rx="16" fill="none" stroke="#CC0000" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="104" cy="164" r="5" fill="#CC0000"/>
  <text x="120" y="169" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ff6666" letter-spacing="3">TURLOCK, CA · AUTO REPAIR</text>

  <!-- Main title line 1 -->
  <text x="80" y="265" font-family="Arial Black, Impact, sans-serif" font-size="100" font-weight="900" fill="#ffffff" letter-spacing="2">THE TIRE</text>
  <!-- Main title line 2 -->
  <text x="80" y="365" font-family="Arial Black, Impact, sans-serif" font-size="100" font-weight="900" fill="#CC0000" letter-spacing="2">BOYS</text>

  <!-- Red divider -->
  <rect x="80" y="390" width="64" height="5" rx="3" fill="#CC0000"/>

  <!-- Tagline -->
  <text x="80" y="432" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#999999" letter-spacing="2">Honest Work. Fair Prices. Fast Service.</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="80"  y="492" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#ffffff">20+</text>
  <text x="80"  y="516" font-family="Arial, sans-serif" font-size="13" fill="#666666" letter-spacing="1">YRS EXPERIENCE</text>
  <!-- Divider -->
  <rect x="170" y="475" width="1" height="48" fill="#333"/>
  <!-- Stat 2 -->
  <text x="186" y="492" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#ffffff">5K+</text>
  <text x="186" y="516" font-family="Arial, sans-serif" font-size="13" fill="#666666" letter-spacing="1">CUSTOMERS</text>
  <!-- Divider -->
  <rect x="290" y="475" width="1" height="48" fill="#333"/>
  <!-- Stat 3 -->
  <text x="306" y="492" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#ffffff">9+</text>
  <text x="306" y="516" font-family="Arial, sans-serif" font-size="13" fill="#666666" letter-spacing="1">SERVICES</text>
  <!-- Divider -->
  <rect x="386" y="475" width="1" height="48" fill="#333"/>
  <!-- Stat 4 -->
  <text x="402" y="492" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#CC0000">7</text>
  <text x="402" y="516" font-family="Arial, sans-serif" font-size="13" fill="#666666" letter-spacing="1">DAYS A WEEK</text>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="580" width="1200" height="50" fill="#CC0000"/>
  <text x="600" y="613" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">THETIREBOYS.COM  ·  (209) 250-2320  ·  400 S GOLDEN STATE BLVD, TURLOCK CA</text>
</svg>
